<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>CIRA Secure Assessment Environment</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,300,400&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Satoshi', sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        user-select: none; /* Disable text selection */
      }
      h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
      }
      .warning {
        background: rgba(239, 68, 68, 0.2);
        border: 1px solid #ef4444;
        padding: 1rem;
        border-radius: 8px;
        color: #fca5a5;
      }
    </style>
  </head>
  <!-- PRD: Browser & Copy-Paste Blocking (Disabling right click context menu) -->
  <body oncontextmenu="return false;" style="margin: 0; overflow: hidden;">
    
    <div style="position: absolute; top: 0; left: 0; width: 100%; text-align: center; pointer-events: none; z-index: 9999;">
      <div class="warning" style="display: inline-block; margin-top: 10px; padding: 10px 20px; font-weight: bold; background: rgba(239, 68, 68, 0.9);">
        SECURE EXAMINATION ENVIRONMENT ACTIVE - NO EXITING ALLOWED
      </div>
    </div>

    <iframe src="http://localhost:5173/login?client=desktop" style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; border: none; background: #0f172a;"></iframe>
  </body>
</html>
