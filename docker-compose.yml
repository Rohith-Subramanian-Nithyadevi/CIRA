version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: cira_postgres
    environment:
      POSTGRES_USER: cira_user
      POSTGRES_PASSWORD: cira_password
      POSTGRES_DB: cira_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mongo1:
    image: mongo:6.0
    container_name: cira_mongo1
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
    restart: unless-stopped

  mongo2:
    image: mongo:6.0
    container_name: cira_mongo2
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27018"]
    ports:
      - "27018:27018"
    volumes:
      - mongo2_data:/data/db
    restart: unless-stopped

  mongo3:
    image: mongo:6.0
    container_name: cira_mongo3
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27019"]
    ports:
      - "27019:27019"
    volumes:
      - mongo3_data:/data/db
    restart: unless-stopped

  mongo-init:
    image: mongo:6.0
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    restart: "no"
    entrypoint: >
      mongosh --host mongo1:27017 --eval 
      '
      rs.initiate({
        _id: "rs0",
        members: [
          { _id: 0, host: "mongo1:27017" },
          { _id: 1, host: "mongo2:27018" },
          { _id: 2, host: "mongo3:27019" }
        ]
      })
      '

volumes:
  postgres_data:
  mongo1_data:
  mongo2_data:
  mongo3_data:
